name: Automated Resume Timestamp Update

# Triggers the workflow on every push event to main or master branches
on:
  push:
    branches: [ main, master ]

jobs:
  update-timestamp:
    runs-on: ubuntu-latest
    
    permissions:
      contents: write

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4
    
    # Ensures Spanish locale is installed on the Ubuntu runner
    - name: Set up Spanish Locale
      run: |
        sudo locale-gen es_CL.UTF-8
        sudo update-locale
    
    - name: Inject Current Date into Markdown
      run: |
        # Fetch current date using Santiago timezone and forcing Spanish formatting
        CURRENT_DATE=$(TZ="America/Santiago" LC_TIME="es_CL.UTF-8" date +'%B de %Y')
        
        # KEY FIX: Replaces the tag with the date AND appends the tag again for future updates
        # sed -i "s/<!-- fecha -->/$CURRENT_DATE <!-- fecha -->/g" resume.md
        sed -i "s|^\*\*Última actualización:\*\*.*|**Última actualización:** $CURRENT_TIME <!-- fecha -->|g" resume.md

    - name: Commit and Push Timestamp Changes
      run: |
        git config --local user.email "github-actions[bot]@users.noreply.github.com"
        git config --local user.name "github-actions[bot]"
        
        # Commits and pushes changes back. '|| exit 0' prevents failure if no content changed
        git commit -am "Bot: Automatically updated last modification date in Spanish" || exit 0
        git push
