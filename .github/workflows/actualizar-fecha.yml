name: Automated Resume Timestamp Update

# Triggers the workflow on every push event to main or master branches
on:
  push:
    branches: [ main, master ]

jobs:
  update-timestamp:
    runs-on: ubuntu-latest
    
    permissions:
      contents: write

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4
    
    # Ensures Spanish locale is installed on the Ubuntu runner
    - name: Set up Spanish Locale
      run: |
        sudo locale-gen es_CL.UTF-8
        sudo update-locale
    
    - name: Inject Current Date into Markdown
      run: |
        # Fetch current date (e.g., '11 de julio de 2026')
        # sed 's/  / /g' removes any double spaces caused by single-digit days
        CURRENT_DATE=$(TZ="America/Santiago" LC_TIME="es_CL.UTF-8" date +'%e de %B de %Y' | sed 's/  / /g')
        
        # Matches the absolute line starting with the prefix and overwrites it completely
        # This prevents text accumulation and keeps the tag hidden at the end for the next run
        sed -i "s|^\*\*Última actualización:\*\*.*|**Última actualización:** $CURRENT_DATE <!-- fecha -->|g" resume.md

    - name: Commit and Push Timestamp Changes
      run: |
        git config --local user.email "github-actions[bot]@users.noreply.github.com"
        git config --local user.name "github-actions[bot]"
        
        # Commits and pushes changes back. '|| exit 0' prevents failure if no content changed
        git commit -am "Bot: Automatically updated last modification date to Spanish format" || exit 0
        git push
